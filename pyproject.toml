[project]
name = "volume-segmantics"
version = "0.3.3"
description = "A toolkit for semantic segmentation of volumetric data using pyTorch deep learning models"
authors = [
    {name = "Oliver King"},
    {name = "Avery Pennington", email = "avery.pennington@rfi.ac.uk"}
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.10"
keywords = ["segmentation", "deep-learning", "volumetric", "3d"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Image Processing",
]
dependencies = [
    "albumentations>=1.1.0,<2.0.0",
    "h5py>=3.0.0,<4.0.0",
    "numpy>=1.18.0,<2.0.0",
    "matplotlib>=3.3.0,<4.0.0",
    "torch>=2.5.1,<2.11.0",
    "monai>=1.3.0",
    "segmentation-models-pytorch",
    "termplotlib>=0.3.6,<1.0.0",
    "imagecodecs>2022.2.22",
    "torchseg",
    "imageio",
    "scikit-image",
    "torchmetrics",
    "termcolor",
    "sparse",
    "mrcfile>=1.5",
    "optuna>=3.0.0",
    "plotly>=5.0.0",
]

