#  2.5D slicing carry-forward
#
# Confirms 2.5D slicing paths still pass under the b3 pipeline-mode
# Lightning trainer with a pipeline.yaml present (semantic-only).
# A trimmed-down version of the v0.4 two_5d_slicing_smoke_tests.yaml.
#
# Run:
#   python tests/scripts/run_smoke.py b3_2.5d
#   python tests/scripts/run_smoke.py b3_2.5d --dry-run

paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5

settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml

output_root: tmp/b3_two5d_smoke

global_overrides:
  train:
    image_size: 64
    num_cyc_frozen: 1
    num_cyc_unfrozen: 0
    patience: 1
    starting_lr: 0.0001
    end_lr: 0.0005
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    use_2_5d_slicing: true
    model:
      type: U_Net
      encoder_name: resnet34
      encoder_weights: null
  predict:
    quality: low
    prediction_axis: Z
  pipeline:
    schema_version: pipeline_v1
    heads:
      semantic:
        enabled: true
        loss: dice_ce
        loss_weight: 1.0

tests:
  # 1. 3-slice 2.5D under b3 trainer.
  - name: train_b3_2_5d_3slice
    type: train
    model_key: b3_2_5d_3slice
    overrides:
      train:
        model_output_fn: b3_two5d_3slice
        num_slices: 3
        slice_file_format: png
        skip_border_slices: false

  # 2. BN-trained guard.
  - name: assert_bn_trained_3slice
    type: b3_assert
    subcommand: checkpoint-trained
    args:
      - "${model:b3_2_5d_3slice}"

  # 3. Predict 3-slice low quality.
  - name: predict_b3_2_5d_3slice_low
    type: predict
    model_key: b3_2_5d_3slice
    overrides:
      predict:
        use_2_5d_prediction: true
        num_slices: 3
        quality: low
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  # 4. 5-slice 2.5D variant.
  - name: train_b3_2_5d_5slice
    type: train
    model_key: b3_2_5d_5slice
    overrides:
      train:
        model_output_fn: b3_two5d_5slice
        num_slices: 5
        slice_file_format: tiff
        skip_border_slices: false

  - name: assert_bn_trained_5slice
    type: b3_assert
    subcommand: checkpoint-trained
    args:
      - "${model:b3_2_5d_5slice}"
