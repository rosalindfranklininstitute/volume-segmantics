# DINO Encoder Basic Quality Assurance Tests
#
# Longer training runs (8 frozen + 5 unfrozen) at full resolution with
# DINOv2 encoders. Tests multiple model architectures.
# 
#
# Run:
#   python tests/scripts/run_smoke.py qa_dino_basic
#   python tests/scripts/run_smoke.py qa_dino_basic --dry-run

paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5

settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml

output_root: tmp/dino_basic_qa

global_overrides:
  train:
    image_size: 512
    num_cyc_frozen: 8
    num_cyc_unfrozen: 5
    patience: 4
    starting_lr: 0.00005
    end_lr: 0.001
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    use_pseudo_labeling: false
    encoder_lr_multiplier: 0.1
    loss_criterion: CombinedCEDiceLoss
    ce_weight: 0.2
    dice_weight: 0.8
    model:
      encoder_weights: dinov2
      encoder_depth: 4
  predict:
    quality: medium
    output_probs: true
    prediction_axis: Z
    use_sliding_window: true
    sw_roi_size: [512, 512]
    sw_overlap: 0.25
    sw_mode: gaussian
    z_smooth: true                  # Enable Z-axis probability smoothing
    z_smooth_sigma: 2.0             # Gaussian sigma in slices (larger = smoother, try 1.0-3.0)


tests:
  # ------------------------------------------------------------------
  # 1. DINO-S U-Net
  # ------------------------------------------------------------------
  - name: qa_dino_s_unet
    type: train
    model_key: qa_dino_s_unet
    overrides:
      train:
        model_output_fn: qa_dino_s_unet
        model:
          type: U_Net
          encoder_name: dinov2_vits14

  - name: qa_predict_dino_s_medium
    type: predict
    model_key: qa_dino_s_unet
    overrides:
      predict:
        quality: medium
        output_probs: true
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  - name: qa_predict_dino_s_high
    type: predict
    model_key: qa_dino_s_unet
    overrides:
      predict:
        quality: high
        output_probs: true

  - name: qa_predict_dino_s_entropy
    type: predict
    model_key: qa_dino_s_unet
    overrides:
      predict:
        quality: z_only
        output_probs: true
        output_entropy: true
    assert_outputs:
      should_exist_globs:
        - "*_entropy.*"

  # ------------------------------------------------------------------
  # 2. DINO-B U-Net
  # ------------------------------------------------------------------
  - name: qa_dino_b_unet
    type: train
    model_key: qa_dino_b_unet
    overrides:
      train:
        model_output_fn: qa_dino_b_unet
        model:
          type: U_Net
          encoder_name: dinov2_vitb14

  - name: qa_predict_dino_b_medium
    type: predict
    model_key: qa_dino_b_unet
    overrides:
      predict:
        quality: medium
        output_probs: true
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  - name: qa_predict_dino_b_entropy
    type: predict
    model_key: qa_dino_b_unet
    overrides:
      predict:
        quality: z_only
        output_probs: true
        output_entropy: true
    assert_outputs:
      should_exist_globs:
        - "*_entropy.*"

  
