# DINO Encoder Semi-supervised Quality Assurance Tests
#
# Longer training runs (8 frozen + 5 unfrozen) at full resolution with
# DINOv2 encoders. Tests supervised baseline, Mean Teacher, pseudo-labeling,
# and combined. 
#
# Run:
#   python tests/scripts/run_smoke.py qa_dino_semisup
#   python tests/scripts/run_smoke.py qa_dino_semisup --dry-run

paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
  unlabeled:
    - training_data/vessels_256cube_DATA.h5

settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml

output_root: tmp/dino_semisup_qa

global_overrides:
  train:
    image_size: 512
    num_cyc_frozen: 8
    num_cyc_unfrozen: 5
    patience: 4
    starting_lr: 0.00005
    end_lr: 0.001
    plot_lr_graph: false
    use_multitask: false
    loss_criterion: CombinedCEDiceLoss
    ce_weight: 0.2
    dice_weight: 0.8
    encoder_lr_multiplier: 0.1
    model:
      type: U_Net
      encoder_name: dinov2_vits14
      encoder_weights: dinov2
      encoder_depth: 4
  predict:
    quality: medium
    output_probs: true
    prediction_axis: Z
    use_sliding_window: true
    sw_roi_size: [512, 512]
    sw_overlap: 0.25
    sw_mode: gaussian

tests:
  # ------------------------------------------------------------------
  # 0. Baseline supervised (for comparison)
  # ------------------------------------------------------------------
  - name: qa_dino_baseline
    type: train
    model_key: qa_dino_baseline
    overrides:
      train:
        model_output_fn: qa_dino_baseline
        use_semi_supervised: false
        use_pseudo_labeling: false

  - name: qa_predict_dino_baseline
    type: predict
    model_key: qa_dino_baseline
    overrides:
      predict:
        quality: medium
        output_probs: true
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  - name: qa_predict_dino_baseline_entropy
    type: predict
    model_key: qa_dino_baseline
    overrides:
      predict:
        quality: z_only
        output_probs: true
        output_entropy: true
    assert_outputs:
      should_exist_globs:
        - "*_entropy.*"

  # ------------------------------------------------------------------
  # 1. Slice unlabeled data
  # ------------------------------------------------------------------
  - name: qa_slice_unlabeled
    type: unlabeled_slicer
    output_key: unlabeled_slices
    output_dir: unlabeled_pool

  # ------------------------------------------------------------------
  # 2. Mean Teacher
  # ------------------------------------------------------------------
  - name: qa_dino_mean_teacher
    type: train
    model_key: qa_dino_mt
    args:
      - "--unlabeled_data_dir"
      - "${artifact:unlabeled_slices}"
    overrides:
      train:
        model_output_fn: qa_dino_mean_teacher
        use_semi_supervised: true
        use_pseudo_labeling: false
        ema_decay: 0.99
        consistency_weight: 0.1
        rampup_start: 0
        rampup_end: 5000

  - name: qa_predict_dino_mt
    type: predict
    model_key: qa_dino_mt
    overrides:
      predict:
        quality: medium
        output_probs: true
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  # ------------------------------------------------------------------
  # 3. Mean Teacher + Pseudo-labeling
  # ------------------------------------------------------------------
  - name: qa_dino_mt_pl
    type: train
    model_key: qa_dino_mt_pl
    args:
      - "--unlabeled_data_dir"
      - "${artifact:unlabeled_slices}"
    overrides:
      train:
        model_output_fn: qa_dino_mt_pl
        use_semi_supervised: true
        use_pseudo_labeling: true
        ema_decay: 0.99
        consistency_weight: 0.1
        rampup_start: 0
        rampup_end: 5000
        pseudo_label_confidence_threshold: 0.95
        pseudo_label_use_teacher: true
        pseudo_label_weight: 0.3
        pseudo_label_threshold_schedule: linear

  - name: qa_predict_dino_mt_pl_medium
    type: predict
    model_key: qa_dino_mt_pl
    overrides:
      predict:
        quality: medium
        output_probs: true
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  - name: qa_predict_dino_mt_pl_high
    type: predict
    model_key: qa_dino_mt_pl
    overrides:
      predict:
        quality: high
        output_probs: true

  - name: qa_predict_dino_mt_pl_entropy
    type: predict
    model_key: qa_dino_mt_pl
    overrides:
      predict:
        quality: z_only
        output_probs: true
        output_entropy: true
    assert_outputs:
      should_exist_globs:
        - "*_entropy.*"
