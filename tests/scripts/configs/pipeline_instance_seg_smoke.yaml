paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml
output_root: tmp/pipeline_instance_seg_smoke
global_overrides:
  train:
    image_size: 64
    num_cyc_frozen: 1
    num_cyc_unfrozen: 0
    patience: 1
    starting_lr: 0.0001
    end_lr: 0.0005
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    model:
      type: U_Net
      encoder_name: resnet34
      encoder_weights: null
  predict:
    quality: medium
    output_probs: true
    prediction_axis: Z
  pipeline:
    schema_version: pipeline_v1
    heads:
      semantic:
        enabled: true
        loss: dice_ce
        loss_weight: 1.0
      boundary:
        enabled: true
        loss: boundary_bce_dice
        loss_weight: 0.5
        width: 2
      distance:
        enabled: true
        loss: distance_l1
        loss_weight: 0.25
      sdm:
        enabled: true
        loss: sdm_l1
        loss_weight: 0.25
        variant: binary
    targets:
      boundary:
        width: 2
      distance:
        distance_transform: edt
      sdm:
        distance_transform: edt
    prediction:
      inference_mode: multi_axis
      per_axis_instances:
        enabled: true
        producer: null
        axes:
        - xy
        - xz
        - yz
    instance_assembly:
      backend: usegment3d
      params:
        params_overrides:
          indirect_method:
            dtform_method: edt
tests:
- name: train_pipeline_instance_seg
  type: train
  model_key: pipeline_instance_seg_model
  overrides:
    train:
      model_output_fn: pipeline_instance_seg_smoke
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: assert_bn_trained
  type: pipeline_assert
  subcommand: checkpoint-trained
  args:
  - ${model:pipeline_instance_seg_model}
- name: predict_distance_watershed
  type: pipeline_predict_zarr
  model_key: pipeline_instance_seg_model
  inference_mode: multi_axis
  instance_assembly_backend: usegment3d
  output_zarr: prediction.zarr
  zarr_key: dw_zarr
  overrides:
    pipeline:
      prediction:
        per_axis_instances:
          producer: distance_watershed
- name: assert_dw_zarr_keys
  type: pipeline_assert
  subcommand: zarr-keys
  args:
  - ${artifact:dw_zarr}
  - --keys
  - teacher_argmax
  - instance_labels
  - per_axis_instances/xy
  - per_axis_instances/xz
  - per_axis_instances/yz
- name: assert_dw_instance_count
  type: pipeline_assert
  subcommand: instance-count-plausible
  args:
  - ${artifact:dw_zarr}
  - --gt-label
  - ${path:label}
  - --max-multiplier
  - '6000'
- name: predict_semantic_cc
  type: pipeline_predict_zarr
  model_key: pipeline_instance_seg_model
  inference_mode: multi_axis
  instance_assembly_backend: usegment3d
  output_zarr: prediction.zarr
  zarr_key: cc_zarr
  overrides:
    pipeline:
      prediction:
        per_axis_instances:
          producer: semantic_cc
- name: assert_cc_zarr_keys
  type: pipeline_assert
  subcommand: zarr-keys
  args:
  - ${artifact:cc_zarr}
  - --keys
  - teacher_argmax
  - instance_labels
- name: assert_cc_instance_count
  type: pipeline_assert
  subcommand: instance-count-plausible
  args:
  - ${artifact:cc_zarr}
  - --gt-label
  - ${path:label}
  - --max-multiplier
  - '6000'
