paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml
output_root: tmp/basic_qa
global_overrides:
  train:
    image_size: 512
    num_cyc_frozen: 8
    num_cyc_unfrozen: 5
    patience: 4
    starting_lr: 5.0e-05
    end_lr: 0.001
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    use_pseudo_labeling: false
    model:
      encoder_name: resnet34
      encoder_weights: imagenet
  predict:
    quality: medium
    output_probs: true
    output_entropy: false
    prediction_axis: Z
    z_smooth: true
    z_smooth_sigma: 2.0
tests:
- name: qa_unet_ce_dice
  type: train
  model_key: qa_unet
  overrides:
    train:
      model_output_fn: qa_unet_ce_dice
      loss_criterion: CombinedCEDiceLoss
      ce_weight: 0.2
      dice_weight: 0.8
      dice_weight_mode: inverse_sqrt_freq
      model:
        type: U_Net
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_predict_unet_medium
  type: predict
  model_key: qa_unet
  overrides:
    predict:
      quality: medium
      output_probs: true
  assert_outputs:
    should_exist_globs:
    - '*_vol_pred.*'
- name: qa_predict_unet_high
  type: predict
  model_key: qa_unet
  overrides:
    predict:
      quality: high
      output_probs: true
  assert_outputs:
    should_exist_globs:
    - '*_vol_pred.*'
- name: qa_predict_unet_entropy
  type: predict
  model_key: qa_unet
  overrides:
    predict:
      quality: z_only
      output_probs: true
      output_entropy: true
  assert_outputs:
    should_exist_globs:
    - '*_vol_pred.*'
    - '*_entropy.*'
- name: qa_unetpp_dice
  type: train
  model_key: qa_unetpp
  overrides:
    train:
      model_output_fn: qa_unetpp_dice
      loss_criterion: DiceLoss
      model:
        type: U_Net_Plus_plus
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_fpn_cw_dice
  type: train
  model_key: qa_fpn
  overrides:
    train:
      model_output_fn: qa_fpn_cw_dice
      loss_criterion: ClassWeightedDiceLoss
      dice_weight_mode: inverse_sqrt_freq
      model:
        type: FPN
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_deeplabv3p_tversky
  type: train
  model_key: qa_deeplabv3p
  overrides:
    train:
      model_output_fn: qa_deeplabv3p_tversky
      loss_criterion: TverskyLoss
      model:
        type: DeepLabV3_Plus
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
