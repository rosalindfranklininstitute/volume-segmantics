paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml
output_root: tmp/dino_multitask_qa
global_overrides:
  train:
    image_size: 512
    num_cyc_frozen: 8
    num_cyc_unfrozen: 5
    patience: 4
    starting_lr: 5.0e-05
    end_lr: 0.001
    plot_lr_graph: false
    use_semi_supervised: false
    use_pseudo_labeling: false
    use_multitask: true
    num_tasks: 2
    seg_loss_weight: 1.0
    boundary_loss_weight: 1.0
    encoder_lr_multiplier: 0.1
    model:
      type: Multitask_Unet
      encoder_weights: dinov2
      encoder_depth: 4
  predict:
    quality: medium
    output_probs: false
    prediction_axis: Z
    use_sliding_window: true
    sw_roi_size:
    - 512
    - 512
    sw_overlap: 0.5
    sw_mode: gaussian
tests:
- name: derive_boundary
  type: derive_boundary
  input: ${path:label}
  output_key: boundary_labels
  output_filename: boundary_labels.h5
  width: 1
  mode: 3d
- name: derive_sdf
  type: derive_distance
  input: ${path:label}
  output_key: sdf_labels
  output_filename: sdf_labels.h5
  dist_type: sdf
  mode: 3d
  normalize: true
  clip_max: 10.0
- name: derive_edt
  type: derive_distance
  input: ${path:label}
  output_key: edt_labels
  output_filename: edt_labels.h5
  dist_type: edt
  mode: 3d
  normalize: true
- name: qa_dino_s_single_task
  type: train
  model_key: qa_dino_s_single
  overrides:
    train:
      model_output_fn: qa_dino_s_single_task
      use_multitask: false
      loss_criterion: CombinedCEDiceLoss
      ce_weight: 0.2
      dice_weight: 0.8
      model:
        type: U_Net
        encoder_name: dinov2_vits14
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_dino_s_2task_shared
  type: train
  model_key: qa_dino_s_2task
  args:
  - --task2
  - ${artifact:boundary_labels}
  overrides:
    train:
      model_output_fn: qa_dino_s_2task_shared
      decoder_sharing: shared
      boundary_loss_type: bce
      loss_criterion: CombinedCEDiceLoss
      model:
        encoder_name: dinov2_vits14
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_dino_s_predict_medium
  type: predict
  model_key: qa_dino_s_2task
  overrides:
    predict:
      quality: medium
      output_probs: true
  assert_outputs:
    should_exist_globs:
    - '*_vol_pred.*'
- name: qa_dino_s_predict_entropy
  type: predict
  model_key: qa_dino_s_2task
  overrides:
    predict:
      quality: z_only
      output_probs: true
      output_entropy: true
  assert_outputs:
    should_exist_globs:
    - '*_entropy.*'
- name: qa_dino_s_3task_sdf
  type: train
  model_key: qa_dino_s_3task
  args:
  - --task2
  - ${artifact:boundary_labels}
  - --task3
  - ${artifact:sdf_labels}
  overrides:
    train:
      model_output_fn: qa_dino_s_3task_sdf
      num_tasks: 3
      decoder_sharing: shared
      boundary_loss_type: bce
      task3_loss_weight: 10.0
      task3_loss_type: regression
      task3_activation: null
      loss_criterion: CombinedCEDiceLoss
      model:
        encoder_name: dinov2_vits14
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
