paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml
output_root: tmp/pipeline_trainer_parity_smoke
global_overrides:
  train:
    image_size: 64
    num_cyc_frozen: 2
    num_cyc_unfrozen: 0
    patience: 2
    starting_lr: 0.0001
    end_lr: 0.0005
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    model:
      type: U_Net
      encoder_name: resnet34
      encoder_weights: null
  predict:
    quality: low
    prediction_axis: Z
  pipeline:
    schema_version: pipeline_v1
    heads:
      semantic:
        enabled: true
        loss: dice_ce
        loss_weight: 1.0
tests:
- name: train_lightning
  type: train
  model_key: lightning_model
  overrides:
    train:
      model_output_fn: parity_lightning
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: train_legacy
  type: train
  model_key: legacy_model
  args:
  - --legacy-trainer
  overrides:
    train:
      model_output_fn: parity_legacy
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: assert_lightning_bn_trained
  type: pipeline_assert
  subcommand: checkpoint-trained
  args:
  - ${model:lightning_model}
- name: assert_legacy_bn_trained
  type: pipeline_assert
  subcommand: checkpoint-trained
  args:
  - ${model:legacy_model}
- name: assert_val_dice_within
  type: pipeline_assert
  subcommand: val-dice-within
  args:
  - ${model:lightning_model}
  - ${model:legacy_model}
  - --max-drift
  - '0.10'
