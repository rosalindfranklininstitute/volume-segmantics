paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml
output_root: tmp/loss_function_qa
global_overrides:
  train:
    image_size: 512
    num_cyc_frozen: 8
    num_cyc_unfrozen: 5
    patience: 4
    starting_lr: 5.0e-05
    end_lr: 0.001
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    use_pseudo_labeling: false
    model:
      type: U_Net
      encoder_name: resnet34
      encoder_weights: imagenet
      dropout_rate: 0.0
  predict:
    quality: medium
    output_probs: true
    output_entropy: false
    prediction_axis: Z
tests:
- name: qa_loss_combined_ce_dice
  type: train
  model_key: qa_combined_ce_dice
  overrides:
    train:
      model_output_fn: qa_loss_combined_ce_dice
      loss_criterion: CombinedCEDiceLoss
      ce_weight: 0.2
      dice_weight: 0.8
      dice_weight_mode: inverse_sqrt_freq
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_predict_combined_ce_dice
  type: predict
  model_key: qa_combined_ce_dice
  assert_outputs:
    should_exist_globs:
    - '*_vol_pred.*'
- name: qa_loss_dice
  type: train
  model_key: qa_dice
  overrides:
    train:
      model_output_fn: qa_loss_dice
      loss_criterion: DiceLoss
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: qa_predict_dice
