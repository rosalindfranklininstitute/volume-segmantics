# Semi-supervised Smoke Tests
#
# Tests Mean Teacher and pseudo-labeling semi-supervised learning.
# Pipeline: train baseline -> slice unlabeled -> train with SSL.
#
# Run:
#   python tests/scripts/run_smoke.py semisup
#   python tests/scripts/run_smoke.py semisup --dry-run

paths:
  image: training_data/vessels_256cube_DATA.h5
  label: training_data/vessels_256cube_LABELS.h5
  unlabeled:
    - training_data/vessels_256cube_DATA.h5

settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml

output_root: tmp/semisup_smoke

global_overrides:
  train:
    image_size: 64
    num_cyc_frozen: 1
    num_cyc_unfrozen: 0
    patience: 1
    starting_lr: 0.0001
    end_lr: 0.0005
    plot_lr_graph: false
    use_multitask: false
    model:
      type: U_Net
      encoder_name: resnet34
      encoder_weights: null
  predict:
    quality: low
    output_probs: false
    output_entropy: false
    prediction_axis: Z

tests:
  # 1. Slice unlabeled data for SSL training
  - name: slice_unlabeled_pool
    type: unlabeled_slicer
    output_key: unlabeled_slices
    output_dir: unlabeled_pool

  # 2. Mean Teacher only
  - name: train_mean_teacher
    type: train
    model_key: mt_model
    args:
      - "--unlabeled_data_dir"
      - "${artifact:unlabeled_slices}"
    overrides:
      train:
        model_output_fn: mean_teacher_only
        use_semi_supervised: true
        use_pseudo_labeling: false
        ema_decay: 0.99
        consistency_weight: 0.1
        rampup_start: 0
        rampup_end: 100

  # 3. Pseudo-labeling only (no Mean Teacher)
  - name: train_pseudo_label
    type: train
    model_key: pl_model
    args:
      - "--unlabeled_data_dir"
      - "${artifact:unlabeled_slices}"
    overrides:
      train:
        model_output_fn: pseudo_label_only
        use_semi_supervised: false
        use_pseudo_labeling: true
        pseudo_label_confidence_threshold: 0.9
        pseudo_label_use_teacher: false
        pseudo_label_weight: 0.5
        pseudo_label_threshold_schedule: fixed

  # 4. Mean Teacher + Pseudo-labeling combined
  - name: train_mt_plus_pl
    type: train
    model_key: mt_pl_model
    args:
      - "--unlabeled_data_dir"
      - "${artifact:unlabeled_slices}"
    overrides:
      train:
        model_output_fn: mt_plus_pseudo_label
        use_semi_supervised: true
        use_pseudo_labeling: true
        ema_decay: 0.99
        consistency_weight: 0.1
        pseudo_label_confidence_threshold: 0.95
        pseudo_label_use_teacher: true
        pseudo_label_weight: 0.3
        pseudo_label_threshold_schedule: linear

  # 5. Predict low quality
  - name: predict_semisup_low
    type: predict
    model_key: mt_pl_model
    overrides:
      predict:
        quality: low
    assert_outputs:
      should_exist_globs:
        - "*_vol_pred.*"

  # 6. Predict medium quality with probs
  - name: predict_semisup_medium
    type: predict
    model_key: mt_pl_model
    overrides:
      predict:
        quality: medium
        output_probs: true

  # 7. Predict z_only with entropy
  - name: predict_semisup_entropy
    type: predict
    model_key: mt_pl_model
    overrides:
      predict:
        quality: z_only
        output_probs: true
        output_entropy: true
    assert_outputs:
      should_exist_globs:
        - "*_entropy.*"
