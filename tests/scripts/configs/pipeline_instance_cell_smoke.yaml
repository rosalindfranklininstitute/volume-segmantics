paths:
  image: training_data/images_and_labels_rgba/platelet-em/images/50-images.tif
  label: training_data/platelet_50_cell_SEMANTIC.tif
settings_templates:
  train: volseg-settings/2d_model_train_settings.yaml
  predict: volseg-settings/2d_model_predict_settings.yaml
output_root: tmp/pipeline_instance_cell_smoke
global_overrides:
  train:
    image_size: 128
    num_cyc_frozen: 1
    num_cyc_unfrozen: 0
    patience: 1
    starting_lr: 0.0001
    end_lr: 0.0005
    plot_lr_graph: false
    use_multitask: false
    use_semi_supervised: false
    model:
      type: U_Net
      encoder_name: tu-convnextv2_base
      encoder_weights: null
  predict:
    quality: low
    output_probs: true
    prediction_axis: Z
  pipeline:
    schema_version: pipeline_v1
    heads:
      semantic:
        enabled: true
        loss: dice_ce
        loss_weight: 1.0
      boundary:
        enabled: true
        loss: boundary_bce_dice
        loss_weight: 0.5
        width: 2
      distance:
        enabled: true
        loss: distance_l1
        loss_weight: 0.25
      sdm:
        enabled: true
        loss: sdm_l1
        loss_weight: 0.25
        variant: binary
    targets:
      boundary:
        width: 2
      distance:
        distance_transform: edt
      sdm:
        distance_transform: edt
    prediction:
      inference_mode: single_axis
      per_axis_instances:
        enabled: true
        producer: semantic_cc   # unused by watershed_3d; cheap placeholder
        axes:
        - xy
    instance_assembly:
      # watershed_3d: direct 3D h-maxima watershed on the learned distance head.
      backend: watershed_3d
      params:
        source: head
        h: 0.35
        smooth_sigma: 1.0
        min_size: 200
tests:
- name: train_pipeline_instance_cell
  type: train
  model_key: pipeline_instance_cell_model
  overrides:
    train:
      model_output_fn: pipeline_instance_cell_smoke
  assert_outputs:
    should_exist_globs:
    - '*_loss_plot.png'
    - '*_train_stats.csv'
    - '*_prediction_image.png'
- name: assert_bn_trained
  type: pipeline_assert
  subcommand: checkpoint-trained
  args:
  - ${model:pipeline_instance_cell_model}
- name: predict_distance_watershed
  type: pipeline_predict_zarr
  model_key: pipeline_instance_cell_model
  inference_mode: single_axis
  instance_assembly_backend: watershed_3d
  output_zarr: prediction.zarr
  zarr_key: dw_zarr
- name: assert_dw_zarr_keys
  type: pipeline_assert
  subcommand: zarr-keys
  args:
  - ${artifact:dw_zarr}
  - --keys
  - teacher_argmax
  - instance_labels
# Smoke trains 1 epoch -> the model can't segment yet, so this only checks the
# detection metric *runs* end-to-end (min-f1 0); the QA config is the quality gate.
- name: assert_dw_instance_detection
  type: pipeline_assert
  subcommand: instance-detection
  args:
  - ${artifact:dw_zarr}
  - --gt-label
  - training_data/platelet_50_cell_INSTANCE.tif
  - --iou-threshold
  - '0.5'
  - --min-f1
  - '0.0'
