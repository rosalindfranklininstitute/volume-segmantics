name: Build and Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach assets to (optional)"
        required: false
        default: ""
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and publish to pypi
        uses: JRubics/poetry-publish@v2.1
        with:
          python_version: "3.11"
          pypi_token: ${{ secrets.PYPI_TOKEN }}
          poetry_install_options: "--without dev"
  zip-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed for softprops to attach release assets
    steps:
      - uses: actions/checkout@v5
      - name: Create zip archives
        run: |
          zip -r volseg-settings.zip volseg-settings
          zip -r training-data.zip training_data
      - name: Upload settings artifact
        uses: actions/upload-artifact@v4
        with:
          name: volseg-settings
          path: volseg-settings.zip
      - name: Upload training data artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: training-data.zip
      - name: Attach archives to the release
        if: github.event_name == 'release' || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            volseg-settings.zip
            training-data.zip
