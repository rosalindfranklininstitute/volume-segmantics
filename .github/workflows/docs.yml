name: Build-sphinx-docs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies (with dev group)
        run: uv sync --dev

      - name: Install sphinx tooling
        run: uv pip install sphinx sphinx-rtd-theme myst_parser

      - name: Build Sphinx docs
        run: |
          cd docs/
          uv run make html

      - name: Add .nojekyll
        run: touch docs/build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html
